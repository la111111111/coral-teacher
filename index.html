<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>珊瑚小助 · 老師版</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,Microsoft JhengHei,system-ui,sans-serif;background:#f5f7fb;color:#1e293b;padding:12px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border:1px solid #e2e8f0;border-radius:999px;background:#fff;color:#64748b;cursor:pointer;font-size:.75rem;font-weight:700;transition:.15s}
.btn:hover{border-color:#0f766e;color:#0f766e;background:#e6f7f4}
.btn-primary{background:#0f766e;color:#fff;border-color:#0f766e}
.btn-primary:hover{background:#0b5e56;color:#fff}
.btn-ai{color:#8b5cf6;border-color:rgba(139,92,246,.4);background:rgba(139,92,246,.05)}
.btn-sm{padding:3px 10px;font-size:.65rem}
.topbar{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px}
.logo{font-weight:900;font-size:.95rem;color:#0f766e;display:flex;align-items:center;gap:8px}
.logo-icon{width:32px;height:32px;border-radius:10px;background:#0f766e;color:#fff;display:grid;place-items:center}
.toolbar{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.content{background:#fff;border:1px solid #e2e8f0;border-radius:14px;padding:12px;min-height:200px}
.file-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px}
.file-card{border:1px solid #e2e8f0;border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer}
.file-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08);transform:translateY(-2px)}
.file-card .icon{font-size:1.2rem;margin-bottom:2px}
.file-card .name{font-weight:700;font-size:.7rem;word-break:break-word}
.file-card .meta{color:#64748b;font-size:.55rem}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9999;align-items:center;justify-content:center;padding:16px}
.modal.show{display:flex}
.modal-box{background:#fff;border-radius:14px;max-width:520px;width:100%;padding:20px;max-height:90vh;overflow:auto}
.modal-box.wide{max-width:700px}
.modal-header{display:flex;justify-content:space-between;align-items:center;font-weight:900;font-size:.9rem;margin-bottom:12px}
.input{width:100%;border:1px solid #e2e8f0;border-radius:999px;padding:6px 14px;font-size:.75rem;outline:none}
.input:focus{border-color:#0f766e}
.form-group{margin-bottom:10px}
.form-group label{font-size:.7rem;font-weight:700;color:#64748b;display:block;margin-bottom:3px}
.footer{display:flex;justify-content:flex-end;gap:6px;margin-top:12px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;border-radius:999px;padding:6px 16px;font-size:.75rem;opacity:0;transition:.2s;z-index:99999}
.toast.show{opacity:1}
.badge{position:relative}
.badge .num{position:absolute;top:-6px;right:-6px;background:#ef4444;color:#fff;font-size:.5rem;font-weight:900;min-width:16px;height:16px;border-radius:999px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.badge .num.hide{display:none}
.send-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center;padding:8px 0}
.send-row select{height:30px;border:1px solid #e2e8f0;border-radius:999px;padding:0 10px;font-size:.65rem;flex:0 0 110px}
.send-row input{flex:1;min-width:100px;height:30px;border:1px solid #e2e8f0;border-radius:999px;padding:0 12px;font-size:.65rem}
.send-status{font-size:.6rem;padding:2px 10px;border-radius:999px;font-weight:700}
.send-status.ok{background:#d1fae5;color:#065f46}
.send-status.err{background:#fee2e2;color:#991b1b}
.send-status.wait{background:#fef3c7;color:#92400e}
.viewer-toolbar{padding:4px 10px;border-bottom:1px solid #e2e8f0;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.viewer-content{padding:12px;min-height:150px;font-size:.85rem;line-height:1.6}
.viewer-content.rich{white-space:normal}
.viewer-content.edit-mode{border:1px solid #e2e8f0;border-radius:8px;background:#f8fafc;padding:10px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><div class="logo-icon"><i class="fa-solid fa-school"></i></div>珊瑚小助 · 老師版</div>
  <div class="toolbar">
    <button class="btn btn-sm badge" id="notifBtn"><i class="fa-solid fa-bell"></i><span class="num hide" id="notifBadge">0</span></button>
    <button class="btn btn-primary btn-sm" id="newFileBtn"><i class="fa-solid fa-file-circle-plus"></i>新文件</button>
    <button class="btn btn-sm" id="newHwBtn"><i class="fa-solid fa-clipboard-check"></i>新.hw</button>
    <button class="btn btn-ai btn-sm" id="aiBtn"><i class="fa-solid fa-wand-magic-sparkles"></i>智能</button>
  </div>
</div>

<div class="content" id="app">
  <div class="file-grid" id="fileGrid"></div>
</div>

<div class="toast" id="toast"></div>

<!-- 通知 -->
<div class="modal" id="notifModal">
  <div class="modal-box">
    <div class="modal-header">🔔 通知 <span id="notifCount"></span><button class="btn btn-sm" onclick="closeNotif()">✕</button></div>
    <div id="notifList"></div>
    <div class="send-row">
      <select id="notifRecip"><option value="all">所有學生</option><option value="F1A">F1A</option><option value="F1B">F1B</option><option value="F1C">F1C</option><option value="F1D">F1D</option><option value="F2A">F2A</option><option value="F2B">F2B</option><option value="F2C">F2C</option><option value="F2D">F2D</option><option value="F3A">F3A</option><option value="F3B">F3B</option><option value="F3C">F3C</option><option value="F3D">F3D</option><option value="F4A">F4A</option><option value="F4B">F4B</option><option value="F4C">F4C</option><option value="F4D">F4D</option><option value="F5A">F5A</option><option value="F5B">F5B</option><option value="F5C">F5C</option><option value="F5D">F5D</option><option value="F6A">F6A</option><option value="F6B">F6B</option><option value="F6C">F6C</option><option value="F6D">F6D</option></select>
      <input id="notifMsg" placeholder="輸入通知內容...">
      <button class="btn btn-primary btn-sm" id="sendNotifBtn">發送</button>
      <span class="send-status" id="sendStatus"></span>
    </div>
    <div class="footer"><button class="btn btn-sm" onclick="closeNotif()">關閉</button><button class="btn btn-sm btn-primary" id="markAllBtn">全部已讀</button></div>
  </div>
</div>

<!-- 新增文件 -->
<div class="modal" id="newFileModal">
  <div class="modal-box">
    <div class="modal-header">📄 新增文件<button class="btn btn-sm" onclick="closeNewFile()">✕</button></div>
    <div class="form-group"><label>名稱</label><input class="input" id="nfName" placeholder="例：3A班_中文工作紙.docx"></div>
    <div class="form-group"><label>科目</label><input class="input" id="nfSubject" placeholder="例：中文"></div>
    <div class="form-group"><label>班別</label><input class="input" id="nfClass" placeholder="例：3A"></div>
    <div class="form-group"><label>截止日</label><input class="input" id="nfDue" type="date"></div>
    <div class="footer"><button class="btn btn-sm" onclick="closeNewFile()">取消</button><button class="btn btn-primary btn-sm" id="confirmNewFileBtn">建立</button></div>
  </div>
</div>

<!-- 檢視器 -->
<div class="modal" id="viewerModal">
  <div class="modal-box wide">
    <div class="modal-header"><span id="viewerTitle"></span><button class="btn btn-sm" onclick="closeViewer()">✕</button></div>
    <div class="viewer-toolbar">
      <button class="btn btn-sm" id="editBtn"><i class="fa-solid fa-pen-to-square"></i>編輯</button>
      <button class="btn btn-sm" id="downloadBtn"><i class="fa-solid fa-download"></i>下載</button>
      <span style="flex:1"></span>
      <span id="viewerStatus" style="font-size:.6rem;color:#64748b">唯讀模式</span>
    </div>
    <div class="viewer-content" id="viewerContent"></div>
    <div class="footer"><button class="btn btn-sm" onclick="closeViewer()">關閉</button><button class="btn btn-primary btn-sm" id="saveViewerBtn">儲存</button></div>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ★★★ 請把下面換成你的 Apps Script 網址 ★★★
  const API_URL = 'https://script.google.com/macros/s/你的網址/exec';

  const STORAGE_KEY = 'coral_teacher_data';
  const typeMap = {
    docx: ['fa-file-word', '#2b579a'],
    xlsx: ['fa-file-excel', '#217346'],
    pptx: ['fa-file-powerpoint', '#b7472a'],
    pdf: ['fa-file-pdf', '#d32f2f'],
    txt: ['fa-file-lines', '#64748b'],
    hw: ['fa-clipboard-check', '#0f766e']
  };

  function getExt(n) { const p = String(n || '').split('.'); return p.length > 1 ? p.pop().toLowerCase() : 'txt'; }
  function getMeta(e) { return typeMap[e] || ['fa-file', '#64748b']; }
  function esc(s) { return String(s || '').replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' })[m]); }
  function toast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('show'), 2000); }

  function makeFile(f) {
    const ext = getExt(f.name);
    const m = getMeta(ext);
    return {
      id: f.id || Date.now(),
      name: f.name || '新文件.txt',
      ext: ext,
      icon: m[0],
      color: m[1],
      subject: f.subject || '班務',
      className: f.className || '未分類',
      due: f.due || new Date().toISOString().slice(0, 10),
      content: f.content || '',
      rich: !!f.rich,
      created: f.created || Date.now(),
      modified: f.modified || Date.now()
    };
  }

  let data = [];
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed)) data = parsed.map(makeFile);
    }
  } catch (e) {}

  if (data.length === 0) {
    data = [
      makeFile({ id: 1, name: '3A班_中文作文.docx', subject: '中文', className: '3A', due: '2026-07-28', content: '三年級中文作文\n題目：我的暑假生活', rich: true }),
      makeFile({ id: 2, name: '3B班_數學工作紙.xlsx', subject: '數學', className: '3B', due: '2026-07-22' }),
      makeFile({ id: 3, name: '6A班_畢業演講稿.pptx', subject: '活動', className: '6A', due: '2026-07-30' })
    ];
    saveData();
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch (e) {}
  }

  let currentFile = null;
  let isEdit = false;
  let hasChanges = false;

  function renderFiles() {
    const grid = document.getElementById('fileGrid');
    grid.innerHTML = '';
    if (!data.length) {
      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:30px;color:#94a3b8;"><i class="fa-solid fa-inbox" style="font-size:2rem;display:block;margin-bottom:6px;"></i>目前沒有檔案</div>';
      return;
    }
    data.forEach(f => {
      const card = document.createElement('div');
      card.className = 'file-card';
      card.dataset.id = f.id;
      card.innerHTML = '<div class="icon"><i class="fa-solid ' + f.icon + '" style="color:' + f.color + ';"></i></div><div class="name">' + esc(f.name) + '</div><div class="meta">' + esc(f.subject) + ' · ' + esc(f.due) + '</div>';
      card.ondblclick = () => openViewer(f);
      grid.appendChild(card);
    });
  }

  // ===== 通知系統 =====
  let notifs = [];
  let notifLoading = false;

  async function loadNotifs() {
    if (notifLoading) return;
    notifLoading = true;
    try {
      const r = await fetch(API_URL + '?action=get');
      const d = await r.json();
      notifs = d || [];
      updateBadge();
      renderNotifList();
    } catch (e) { console.warn(e); }
    notifLoading = false;
  }

  function updateBadge() {
    const b = document.getElementById('notifBadge');
    const c = notifs.filter(n => n.read !== 'true' && n.read !== true).length;
    if (c > 0) { b.textContent = c > 99 ? '99+' : c; b.classList.remove('hide'); } else { b.classList.add('hide'); }
  }

  function renderNotifList() {
    const list = document.getElementById('notifList');
    const count = document.getElementById('notifCount');
    if (!notifs || !notifs.length) { list.innerHTML = '<div style="padding:20px;text-align:center;color:#94a3b8;">沒有通知</div>'; count.textContent = ''; return; }
    count.textContent = '（' + notifs.length + ' 則，' + notifs.filter(n => n.read !== 'true' && n.read !== true).length + ' 未讀）';
    list.innerHTML = notifs.map(n => {
      const isRead = n.read === 'true' || n.read === true;
      return '<div class="notif-item' + (isRead ? '' : ' unread') + '"><span>👨‍🏫</span><div><div style="font-weight:700;font-size:.7rem;">' + esc(n.title) + '</div><div style="font-size:.65rem;color:#64748b;">' + esc(n.message) + ' — ' + esc(n.from || '老師') + '</div><div style="font-size:.5rem;color:#94a3b8;">' + new Date(n.time).toLocaleString() + '</div></div>' + (isRead ? '' : '<span class="btn btn-sm" style="font-size:.5rem;padding:1px 6px;" onclick="markRead(' + n.id + ')">已讀</span>') + '</div>';
    }).join('');
  }

  async function markRead(id) {
    try { await fetch(API_URL + '?action=mark_read&id=' + id); await loadNotifs(); } catch (e) {}
  }

  async function markAllRead() {
    try { await fetch(API_URL + '?action=mark_all_read'); await loadNotifs(); toast('✅ 全部已讀'); } catch (e) {}
  }

  async function sendNotif() {
    const recip = document.getElementById('notifRecip').value;
    const msg = document.getElementById('notifMsg').value.trim();
    const st = document.getElementById('sendStatus');
    if (!msg) { toast('請輸入內容'); return; }
    st.textContent = '⏳ 發送中...';
    st.className = 'send-status wait';
    try {
      const r = await fetch(API_URL + '?action=add&title=' + encodeURIComponent('📢 老師通知') + '&message=' + encodeURIComponent(msg) + '&from=' + encodeURIComponent('老師') + '&recipient=' + encodeURIComponent(recip) + '&type=teacher');
      const d = await r.json();
      if (d.success) {
        document.getElementById('notifMsg').value = '';
        st.textContent = '✅ 已發送';
        st.className = 'send-status ok';
        await loadNotifs();
      } else {
        st.textContent = '❌ 發送失敗';
        st.className = 'send-status err';
      }
    } catch (e) {
      st.textContent = '❌ 網路錯誤';
      st.className = 'send-status err';
    }
    setTimeout(() => { st.textContent = ''; st.className = 'send-status'; }, 4000);
  }

  // ===== 新增檔案 =====
  function openNewFile() {
    document.getElementById('nfName').value = '新班務文件.docx';
    document.getElementById('nfSubject').value = '班務';
    document.getElementById('nfClass').value = '3A';
    document.getElementById('nfDue').value = new Date().toISOString().slice(0, 10);
    document.getElementById('newFileModal').classList.add('show');
  }

  function closeNewFile() {
    document.getElementById('newFileModal').classList.remove('show');
  }

  function confirmNewFile() {
    const name = document.getElementById('nfName').value.trim();
    if (!name) { toast('請輸入名稱'); return; }
    const sub = document.getElementById('nfSubject').value.trim() || '班務';
    const cls = document.getElementById('nfClass').value.trim() || '未分類';
    const due = document.getElementById('nfDue').value || new Date().toISOString().slice(0, 10);
    data.unshift(makeFile({ id: Date.now(), name, subject: sub, className: cls, due, content: '' }));
    saveData();
    renderFiles();
    closeNewFile();
    toast('✅ 已建立：' + name);
  }

  function createHw() {
    data.unshift(makeFile({ id: Date.now(), name: 'F1A_功課追蹤.hw', subject: '功課追蹤', className: 'F1A', due: new Date().toISOString().slice(0, 10), content: '📋 功課追蹤檔案' }));
    saveData();
    renderFiles();
    toast('✅ 已建立 .hw 文件');
  }

  function openViewer(f) {
    currentFile = f;
    isEdit = false;
    hasChanges = false;
    document.getElementById('viewerTitle').innerHTML = '<i class="fa-solid ' + f.icon + '" style="color:' + f.color + ';"></i> ' + esc(f.name);
    const c = document.getElementById('viewerContent');
    c.className = 'viewer-content';
    c.contentEditable = 'false';
    if (f.rich) {
      c.classList.add('rich');
      c.innerHTML = f.content || '';
    } else {
      c.textContent = f.content || '(無內容)';
    }
    document.getElementById('viewerStatus').textContent = '唯讀模式';
    document.getElementById('editBtn').style.display = 'inline-flex';
    document.getElementById('saveViewerBtn').style.display = 'none';
    document.getElementById('viewerModal').classList.add('show');
  }

  function closeViewer() {
    if (hasChanges && !confirm('有未儲存的變更，確定要關閉嗎？')) return;
    document.getElementById('viewerModal').classList.remove('show');
    currentFile = null;
    isEdit = false;
    hasChanges = false;
  }

  function toggleEdit() {
    if (!currentFile) return;
    isEdit = !isEdit;
    const c = document.getElementById('viewerContent');
    const s = document.getElementById('viewerStatus');
    const eb = document.getElementById('editBtn');
    const sb = document.getElementById('saveViewerBtn');
    if (isEdit) {
      c.contentEditable = 'true';
      c.classList.add('edit-mode');
      if (!c.innerHTML.trim()) c.innerHTML = '<p>請輸入內容...</p>';
      c.focus();
      s.textContent = '✏️ 編輯模式';
      eb.innerHTML = '<i class="fa-solid fa-eye"></i> 檢視';
      sb.style.display = 'inline-flex';
      hasChanges = false;
    } else {
      c.contentEditable = 'false';
      c.classList.remove('edit-mode');
      s.textContent = '唯讀模式';
      eb.innerHTML = '<i class="fa-solid fa-pen-to-square"></i> 編輯';
      sb.style.display = 'none';
      currentFile.content = currentFile.rich ? c.innerHTML : c.innerText;
      hasChanges = false;
      isEdit = false;
    }
  }

  function saveViewer() {
    if (!currentFile) return;
    const c = document.getElementById('viewerContent');
    currentFile.content = currentFile.rich ? c.innerHTML : c.innerText;
    currentFile.modified = Date.now();
    saveData();
    hasChanges = false;
    toast('✅ 已儲存');
    renderFiles();
    document.getElementById('saveViewerBtn').style.display = 'none';
  }

  function downloadFile() {
    if (!currentFile) return;
    const content = currentFile.content || '';
    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = currentFile.name;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('已下載');
  }

  // ===== 事件綁定 =====
  document.getElementById('newFileBtn').onclick = openNewFile;
  document.getElementById('newHwBtn').onclick = createHw;
  document.getElementById('confirmNewFileBtn').onclick = confirmNewFile;
  document.getElementById('notifBtn').onclick = function() { renderNotifList(); document.getElementById('notifModal').classList.add('show'); };
  document.getElementById('markAllBtn').onclick = markAllRead;
  document.getElementById('sendNotifBtn').onclick = sendNotif;
  document.getElementById('notifMsg').onkeydown = function(e) { if (e.key === 'Enter') sendNotif(); };
  document.getElementById('editBtn').onclick = toggleEdit;
  document.getElementById('saveViewerBtn').onclick = saveViewer;
  document.getElementById('downloadBtn').onclick = downloadFile;
  document.getElementById('viewerModal').onclick = function(e) { if (e.target === this) closeViewer(); };

  function closeNotif() { document.getElementById('notifModal').classList.remove('show'); }
  window.closeNotif = closeNotif;
  window.closeNewFile = closeNewFile;
  window.closeViewer = closeViewer;
  window.markRead = markRead;

  // ===== 初始化 =====
  renderFiles();
  loadNotifs();
  setInterval(loadNotifs, 30000);
  toast('📚 珊瑚小助 · 老師版 已啟動');
})();
</script>
</body>
</html>
