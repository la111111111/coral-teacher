<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<meta name="theme-color" content="#0f766e">
<title>珊瑚小助 · 老師版</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #f5f7fb; --surface: #ffffff; --surface2: #f8fafc; --text: #1e293b; --text2: #64748b;
  --border: #e2e8f0; --accent: #0f766e; --accent-light: #e6f7f4;
  --danger: #ef4444; --warning: #f59e0b; --success: #10b981; --info: #3b82f6;
  --purple: #8b5cf6; --shadow: 0 18px 45px rgba(15,23,42,0.14);
  --notification-bg: #fef3c7; --notification-border: #f59e0b;
}
[data-theme="dark"] {
  --bg: #0f172a; --surface: #1e293b; --surface2: #111827; --text: #f1f5f9; --text2: #94a3b8;
  --border: #334155; --accent: #2dd4bf; --accent-light: #134e4a; --shadow: 0 18px 45px rgba(0,0,0,0.35);
  --notification-bg: #78350f; --notification-border: #f59e0b;
}
body { font-family: "Segoe UI", "Microsoft JhengHei", system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
button, input, select, textarea { font-family: inherit; }
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 16px; display: flex; flex-direction: column; flex-shrink: 0; z-index: 20; }
.logo { display: flex; align-items: center; gap: 10px; color: var(--accent); font-size: 1rem; font-weight: 900; padding: 8px 8px 18px; }
.logo-icon { width: 36px; height: 36px; border-radius: 12px; background: var(--accent); color: white; display: grid; place-items: center; }
.nav-section { margin-bottom: 16px; }
.nav-title { font-size: 0.68rem; color: var(--text2); font-weight: 850; text-transform: uppercase; padding: 6px 8px 4px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-weight: 700; color: var(--text); transition: 0.15s; user-select: none; }
.nav-item i { width: 18px; color: var(--text2); text-align: center; }
.nav-item:hover { background: var(--bg); }
.nav-item.active { background: var(--accent-light); color: var(--accent); }
.nav-item.active i { color: var(--accent); }
.sidebar-footer { margin-top: auto; display: grid; gap: 8px; }
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
.topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; display: grid; gap: 8px; }
.top-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; flex-wrap: wrap; }
.page-title h1 { font-size: 1rem; font-weight: 900; display: flex; align-items: center; gap: 8px; }
.tool-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.btn { border: 1px solid var(--border); background: transparent; color: var(--text2); padding: 5px 12px; border-radius: 999px; cursor: pointer; font-size: 0.72rem; font-weight: 750; display: inline-flex; align-items: center; justify-content: center; gap: 6px; transition: 0.15s; white-space: nowrap; }
.btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
.btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
.btn.primary:hover { background: #0b5e56; color: white; }
.btn.ai { color: var(--purple); border-color: rgba(139,92,246,0.4); background: rgba(139,92,246,0.05); }
.btn.danger { color: var(--danger); border-color: rgba(239,68,68,0.4); }
.filters { display: grid; grid-template-columns: minmax(140px, 1fr) 110px 110px; gap: 8px; }
.search-wrap { position: relative; }
.search-wrap i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text2); font-size: 0.75rem; }
.input, .select { width: 100%; border: 1px solid var(--border); background: var(--bg); color: var(--text); border-radius: 999px; padding: 6px 12px; outline: none; font-size: 0.75rem; }
.search-wrap .input { padding-left: 34px; }
.ai-panel { display: none; grid-template-columns: 1fr auto; gap: 8px; align-items: center; }
.ai-panel.active { display: grid; }
.content { flex: 1; padding: 12px; }
.view { display: none; }
.view.active { display: block; }
.kanban-board { display: grid; grid-template-columns: repeat(5, minmax(200px, 1fr)); gap: 10px; align-items: start; }
.kanban-column { background: var(--surface2); border: 1px solid var(--border); border-radius: 14px; padding: 8px; min-height: 400px; display: flex; flex-direction: column; }
.kanban-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.kanban-title strong { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; font-weight: 900; }
.count { min-width: 24px; height: 22px; border-radius: 999px; background: var(--surface); border: 1px solid var(--border); display: grid; place-items: center; color: var(--text2); font-size: 0.65rem; font-weight: 850; }
.kanban-list { display: flex; flex-direction: column; gap: 6px; min-height: 100px; }
.card { background: var(--surface); border: 1px solid var(--border); border-left: 4px solid var(--accent); border-radius: 12px; padding: 8px; cursor: grab; transition: 0.15s; user-select: none; }
.card:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
.card.priority-high { border-left-color: var(--danger); }
.card.priority-mid { border-left-color: var(--warning); }
.card.priority-low { border-left-color: var(--info); }
.card-top { display: flex; gap: 6px; align-items: flex-start; }
.file-icon-sm { width: 30px; height: 30px; border-radius: 8px; background: var(--bg); display: grid; place-items: center; flex-shrink: 0; font-size: 0.9rem; }
.card-main { flex: 1; min-width: 0; }
.card-title { font-size: 0.75rem; font-weight: 900; line-height: 1.3; word-break: break-word; }
.card-meta { color: var(--text2); font-size: 0.6rem; margin-top: 2px; }
.preview { margin-top: 4px; color: var(--text2); font-size: 0.65rem; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 6px; }
.tag { background: var(--accent-light); color: var(--accent); padding: 1px 6px; border-radius: 999px; font-size: 0.55rem; font-weight: 850; }
.tag.gray { background: var(--bg); color: var(--text2); border: 1px solid var(--border); }
.tag.red { background: #fee2e2; color: #991b1b; }
.tag.orange { background: #fef3c7; color: #92400e; }
.due { margin-top: 4px; font-size: 0.6rem; color: var(--text2); display: flex; align-items: center; gap: 4px; }
.due.overdue { color: var(--danger); font-weight: 850; }
.file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
.file-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 6px 8px; text-align: center; cursor: pointer; transition: 0.15s; user-select: none; }
.file-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
.file-card.selected { border-color: var(--accent); background: var(--accent-light); }
.file-card .file-icon-sm { margin: 0 auto 4px; font-size: 1.2rem; width: 32px; height: 32px; border-radius: 8px; background: var(--bg); display: grid; place-items: center; }
.file-name { font-size: 0.7rem; font-weight: 850; word-break: break-word; line-height: 1.3; }
.file-meta { color: var(--text2); font-size: 0.55rem; margin-top: 2px; }
.calendar-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 10px; overflow-x: auto; }
.cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 8px; }
.cal-header h2 { font-size: 0.9rem; font-weight: 900; }
.cal-nav { display: flex; gap: 4px; }
.cal-weekdays, .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); min-width: 600px; }
.cal-weekdays { text-align: center; color: var(--text2); font-size: 0.65rem; font-weight: 850; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
.cal-grid { border-left: 1px solid var(--border); border-top: 1px solid var(--border); }
.cal-cell { min-height: 70px; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 4px; background: var(--surface); }
.cal-cell.today { background: var(--accent-light); }
.cal-date { font-size: 0.65rem; font-weight: 900; margin-bottom: 2px; }
.cal-task { font-size: 0.55rem; padding: 1px 4px; border-radius: 3px; background: #dbeafe; color: #1d4ed8; margin-bottom: 2px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; cursor: pointer; }
.cal-task.overdue { background: #fee2e2; color: #991b1b; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 10000; align-items: center; justify-content: center; padding: 10px; }
.modal-overlay.active { display: flex; }
.dialog { background: var(--surface); color: var(--text); border-radius: 16px; width: 880px; max-width: 95vw; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
.dialog.wide { width: 1000px; }
.dialog.small { width: 460px; }
.dialog.medium { width: 550px; max-height: 80vh; }
.dialog-header { padding: 10px 16px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.dialog-title { font-weight: 900; display: flex; align-items: center; gap: 8px; min-width: 0; font-size: 0.85rem; }
.dialog-title span { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.viewer-toolbar { padding: 6px 14px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.viewer-content { flex: 1; min-height: 280px; overflow: auto; padding: 12px; line-height: 1.6; font-size: 0.85rem; }
.viewer-content.rich { white-space: normal; }
.viewer-content.edit-mode { margin: 10px; border: 1px solid var(--border); border-radius: 10px; background: var(--bg); outline: none; padding: 12px; }
.dialog-footer { padding: 8px 14px; border-top: 1px solid var(--border); background: var(--bg); display: flex; justify-content: flex-end; gap: 6px; flex-wrap: wrap; }
.form-body { padding: 14px; overflow-y: auto; }
.form-grid { display: grid; grid-template-columns: 80px 1fr; gap: 6px 10px; align-items: center; font-size: 0.75rem; }
.form-label { color: var(--text2); font-weight: 850; }
.editor-toolbar { padding: 4px 10px; border-bottom: 1px solid var(--border); display: none; gap: 4px; flex-wrap: wrap; background: var(--surface2); align-items: center; }
.editor-toolbar.active { display: flex; }
.editor-toolbar .btn { font-size: 0.6rem; padding: 3px 7px; border-radius: 4px; border: 1px solid transparent; background: transparent; color: var(--text2); cursor: pointer; }
.editor-toolbar .btn:hover { background: var(--accent-light); color: var(--accent); }
.editor-toolbar select { height: 24px; border-radius: 4px; border: 1px solid var(--border); background: var(--bg); color: var(--text); padding: 0 4px; font-size: 0.55rem; outline: none; max-width: 60px; }
.editor-toolbar .color-input { width: 22px; height: 22px; border: 1px solid var(--border); border-radius: 3px; background: transparent; padding: 1px; cursor: pointer; }
.editor-toolbar .color-input::-webkit-color-swatch-wrapper { padding: 0; }
.editor-toolbar .color-input::-webkit-color-swatch { border: 1px solid var(--border); border-radius: 2px; }
.more-menu-wrapper { position: relative; display: inline-flex; }
.more-menu-toggle { font-size: 0.6rem; padding: 3px 7px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface); color: var(--text2); cursor: pointer; display: flex; align-items: center; gap: 2px; }
.more-menu-toggle:hover { background: var(--accent-light); color: var(--accent); }
.more-menu-dropdown { display: none; position: absolute; top: calc(100% + 4px); right: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow); padding: 4px 0; min-width: 160px; z-index: 99999; max-height: 300px; overflow-y: auto; }
.more-menu-dropdown.show { display: block; }
.more-menu-dropdown .btn { display: flex; width: 100%; border: none; border-radius: 0; padding: 5px 12px; font-size: 0.65rem; justify-content: flex-start; background: transparent; color: var(--text); gap: 8px; }
.more-menu-dropdown .btn:hover { background: var(--accent-light); color: var(--accent); }
.more-menu-dropdown .separator { height: 1px; background: var(--border); margin: 3px 0; }
.more-menu-dropdown .btn i { width: 16px; text-align: center; }
.ctx-menu { display: none; position: fixed; z-index: 11000; min-width: 200px; background: var(--surface); border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 10px; overflow: hidden; padding: 4px 0; }
.ctx-header { padding: 4px 14px; color: var(--text2); font-size: 0.6rem; font-weight: 850; text-transform: uppercase; }
.ctx-item { padding: 6px 14px; display: flex; align-items: center; gap: 8px; font-size: 0.7rem; cursor: pointer; }
.ctx-item:hover { background: var(--bg); color: var(--accent); }
.ctx-item.danger:hover { color: var(--danger); background: #fee2e2; }
.ctx-divider { height: 1px; background: var(--border); margin: 2px 0; }
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--surface); border-radius: 999px; padding: 6px 14px; font-size: 0.72rem; opacity: 0; pointer-events: none; transition: 0.2s; z-index: 12000; box-shadow: var(--shadow); }
.toast.show { opacity: 1; }
.status-bar { border-top: 1px solid var(--border); background: var(--surface); color: var(--text2); height: 26px; padding: 0 14px; display: flex; align-items: center; justify-content: space-between; font-size: 0.65rem; gap: 8px; }
.hw-app { padding: 6px 8px; background: var(--bg); }
.hw-top { display: flex; flex-wrap: wrap; gap: 4px; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.hw-panel { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 4px 8px; margin-bottom: 4px; }
.hw-panel:last-child { margin-bottom: 0; }
.hw-chips { display: flex; gap: 3px; flex-wrap: wrap; }
.hw-chip { border: 1px solid var(--border); border-radius: 999px; padding: 2px 8px; cursor: pointer; font-size: 0.6rem; background: var(--surface); color: var(--text2); font-weight: 700; }
.hw-chip.active { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }
.hw-subjects { display: flex; gap: 3px; flex-wrap: wrap; }
.hw-subject { font-size: 0.6rem; border: 1px solid var(--border); border-radius: 999px; padding: 2px 6px; cursor: pointer; background: var(--bg); }
.hw-subject.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); }
.hw-table-wrap { overflow-x: auto; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
.hw-table { width: 100%; min-width: 500px; border-collapse: collapse; font-size: 0.6rem; }
.hw-table th, .hw-table td { border-bottom: 1px solid var(--border); padding: 2px 4px; text-align: center; }
.hw-table th { background: var(--surface2); color: var(--text2); font-size: 0.55rem; }
.hw-name { position: sticky; left: 0; background: var(--surface); text-align: left !important; min-width: 60px; z-index: 2; padding-left: 4px !important; }
.hw-cell { cursor: pointer; border-radius: 4px; font-weight: 900; font-size: 0.75rem; padding: 1px 4px; }
.hw-cell[data-status="submitted"] { color: var(--success); }
.hw-cell[data-status="late"] { color: var(--warning); }
.hw-cell[data-status="absent"] { color: var(--danger); }
.hw-cell[data-status="empty"] { color: var(--text2); opacity: 0.4; }
.hw-report { font-size: 0.65rem; line-height: 1.3; }
.hw-row { display: flex; gap: 4px; flex-wrap: wrap; align-items: center; }
.hw-ai-box { display: grid; grid-template-columns: 1fr auto; gap: 4px; margin-top: 4px; }
.inline-confirm { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px; text-align: center; }
.inline-confirm p { margin-bottom: 10px; font-size: 0.8rem; }
.inline-confirm .icon-big { font-size: 2.5rem; display: block; margin-bottom: 8px; }
.notification-btn { position: relative; background: transparent; border: none; color: var(--text2); font-size: 1.1rem; cursor: pointer; padding: 4px 6px; border-radius: 999px; transition: 0.15s; display: flex; align-items: center; justify-content: center; }
.notification-btn:hover { background: var(--bg); color: var(--accent); }
.notification-badge { position: absolute; top: -4px; right: -6px; background: var(--danger); color: white; font-size: 0.5rem; font-weight: 900; min-width: 18px; height: 18px; border-radius: 999px; display: flex; align-items: center; justify-content: center; padding: 0 4px; border: 2px solid var(--surface); transition: 0.2s; }
.notification-badge.hidden { display: none; }
.notification-list { max-height: 350px; overflow-y: auto; padding: 4px 0; }
.notification-item { display: flex; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); transition: 0.1s; cursor: default; align-items: flex-start; }
.notification-item:last-child { border-bottom: none; }
.notification-item:hover { background: var(--bg); }
.notification-item.unread { background: var(--notification-bg); border-left: 4px solid var(--notification-border); }
.notification-item .n-icon { font-size: 1rem; width: 24px; text-align: center; flex-shrink: 0; margin-top: 1px; }
.notification-item .n-content { flex: 1; min-width: 0; }
.notification-item .n-content .n-title { font-size: 0.7rem; font-weight: 850; color: var(--text); }
.notification-item .n-content .n-message { font-size: 0.65rem; color: var(--text2); margin-top: 1px; line-height: 1.4; }
.notification-item .n-content .n-time { font-size: 0.5rem; color: var(--text2); opacity: 0.7; margin-top: 2px; }
.notification-item .n-mark-read { font-size: 0.55rem; color: var(--accent); cursor: pointer; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
.notification-item .n-mark-read:hover { background: var(--accent-light); }
.notification-empty { text-align: center; padding: 30px 20px; color: var(--text2); font-size: 0.8rem; }
.notification-empty i { font-size: 2rem; display: block; margin-bottom: 10px; opacity: 0.5; }
.notification-send-area { padding: 8px 12px; border-top: 1px solid var(--border); background: var(--bg); }
.notification-send-area .send-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.notification-send-area .send-row select { height: 30px; border: 1px solid var(--border); border-radius: 999px; padding: 0 12px; font-size: 0.65rem; background: var(--bg); color: var(--text); outline: none; flex: 0 0 110px; }
.notification-send-area .send-row input { flex: 1; min-width: 120px; height: 30px; border: 1px solid var(--border); border-radius: 999px; padding: 0 14px; font-size: 0.65rem; background: var(--bg); color: var(--text); outline: none; }
.notification-send-area .send-row .btn { height: 30px; font-size: 0.65rem; padding: 0 14px; }
.send-status { font-size: 0.6rem; padding: 2px 10px; border-radius: 999px; font-weight: 700; }
.send-status.success { background: #d1fae5; color: #065f46; }
.send-status.error { background: #fee2e2; color: #991b1b; }
.send-status.sending { background: #fef3c7; color: #92400e; }
.save-top-right { position: sticky; top: 0; z-index: 10; background: var(--bg); padding: 4px 0; display: flex; justify-content: flex-end; gap: 6px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
.edit-hint { background: var(--edit-green); border: 2px solid var(--edit-green-border); border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; color: var(--edit-green-border); }
.readonly-hint { background: var(--text2); color: white; border-radius: 999px; padding: 2px 14px; font-size: 0.55rem; font-weight: 700; }
@media (max-width: 1100px) { .kanban-board { display: flex; overflow-x: auto; } .kanban-column { min-width: 240px; } .filters { grid-template-columns: 1fr 100px 100px; } }
@media (max-width: 720px) {
  .app { flex-direction: column; }
  .sidebar { width: 100%; height: auto; position: static; border-right: none; border-bottom: 1px solid var(--border); flex-direction: row; align-items: center; gap: 6px; overflow-x: auto; padding: 8px; }
  .filters { grid-template-columns: 1fr; }
  .dialog { width: 96vw; height: 92vh; }
  .form-grid { grid-template-columns: 1fr; }
  .notification-send-area .send-row { flex-direction: column; }
  .notification-send-area .send-row select { flex: 1; width: 100%; }
  .notification-send-area .send-row input { width: 100%; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo"><div class="logo-icon"><i class="fa-solid fa-school"></i></div><div><div>珊瑚小助</div><div style="font-size:0.6rem;color:var(--text2);font-weight:700;">👨‍🏫 老師版</div></div></div>
    <div class="nav-section">
      <div class="nav-title">主選單</div>
      <div class="nav-item active" data-view="kanban"><i class="fa-solid fa-table-columns"></i> Kanban</div>
      <div class="nav-item" data-view="files"><i class="fa-solid fa-folder-tree"></i> 檔案總管</div>
      <div class="nav-item" data-view="calendar"><i class="fa-solid fa-calendar-days"></i> 行事曆</div>
    </div>
    <div class="sidebar-footer"><button class="btn" id="themeToggle" style="width:100%;justify-content:center;"><i class="fa-solid fa-moon"></i> 主題</button></div>
  </aside>
  <main class="main">
    <header class="topbar">
      <div class="top-row">
        <div class="page-title"><h1><i class="fa-solid fa-layer-group" style="color:var(--accent);"></i> 文件流程工作台</h1></div>
        <div class="tool-group">

<div class="modal-overlay" id="confirmModal"><div class="dialog small"><div class="dialog-header"><div class="dialog-title">確認操作</div></div><div class="form-body"><div class="inline-confirm"><p id="confirmMsg"></p><div class="hw-row" style="justify-content:center;"><button class="btn danger" id="confirmYes">確定</button><button class="btn" id="confirmNo">取消</button></div></div></div></div></div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  // ★★★ 請把下面換成你的 Apps Script 網址 ★★★
  const API_URL = 'https://script.google.com/macros/s/AKfycby2M_xlvoOGZjUpOkUbEUX8nIp7IOLVYaLwS2dRjiNep4V96nwTZ60gfT2fTmtkqceY/exec';

  // ============================================================
  //  通知系統
  // ============================================================
  let notifications = [];
  let isLoading = false;

  async function loadNotifications() {
    if (isLoading) return;
    isLoading = true;
    try {
      const res = await fetch(API_URL + '?action=get');
      const data = await res.json();
      notifications = data || [];
      updateNotificationBadge();
      renderNotificationList();
    } catch(e) { console.warn('載入通知失敗:', e); }
    isLoading = false;
  }

  function getUnreadCount() {
    return notifications.filter(n => n.read !== 'true' && n.read !== true).length;
  }

  function updateNotificationBadge() {
    const badge = document.getElementById('notificationBadge');
    const count = getUnreadCount();
    if (count > 0) { badge.textContent = count > 99 ? '99+' : count; badge.classList.remove('hidden'); }
    else { badge.classList.add('hidden'); }
  }

  function renderNotificationList() {
    const list = document.getElementById('notificationList');
    const countEl = document.getElementById('notificationCount');
    if (!notifications || notifications.length === 0) {
      list.innerHTML = `<div class="notification-empty"><i class="fa-solid fa-bell-slash"></i>沒有通知</div>`;
      countEl.textContent = '';
      return;
    }
    countEl.textContent = `（${notifications.length} 則通知，${getUnreadCount()} 則未讀）`;
    list.innerHTML = notifications.map(n => {
      const isRead = n.read === 'true' || n.read === true;
      const icon = n.type === 'teacher' ? '👨‍🏫' : n.type === 'submit' ? '📤' : '📢';
      const timeStr = new Date(n.time).toLocaleString('zh-HK', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
      return `
        <div class="notification-item ${isRead ? '' : 'unread'}">
          <div class="n-icon">${icon}</div>
          <div class="n-content">
            <div class="n-title">${esc(n.title)} <span style="font-size:0.5rem;color:var(--text2);">→ ${n.recipient === 'all' ? '全部' : n.recipient}</span></div>
            <div class="n-message">${esc(n.message)}${n.from ? ' — ' + esc(n.from) : ''}</div>
            <div class="n-time">${timeStr}</div>
          </div>
          ${!isRead ? `<span class="n-mark-read" data-id="${n.id}">標記已讀</span>` : ''}
        </div>
      `;
    }).join('');
    list.querySelectorAll('.n-mark-read').forEach(el => {
      el.addEventListener('click', function(e) {
        e.stopPropagation();
        const id = parseInt(this.dataset.id);
        markNotificationRead(id);
      });
    });
  }

  async function markNotificationRead(id) {
    try { await fetch(API_URL + '?action=mark_read&id=' + id); await loadNotifications(); }
    catch(e) { toast('❌ 操作失敗'); }
  }

  async function markAllRead() {
    try { await fetch(API_URL + '?action=mark_all_read'); await loadNotifications(); toast('✅ 全部已讀'); }
    catch(e) { toast('❌ 操作失敗'); }
  }

  let sendStatusTimer = null;

  async function sendNotification() {
    const recipient = document.getElementById('notifRecipient').value;
    const message = document.getElementById('notifMessage').value.trim();
    const statusEl = document.getElementById('sendStatus');
    
    if (!message) { toast('請輸入通知內容'); return; }

    statusEl.textContent = '⏳ 發送中...';
    statusEl.className = 'send-status sending';

    try {
      const url = API_URL + '?action=add' +
        '&title=' + encodeURIComponent('📢 老師通知') +
        '&message=' + encodeURIComponent(message) +
        '&from=' + encodeURIComponent('老師') +
        '&recipient=' + encodeURIComponent(recipient) +
        '&type=teacher';
      
      const res = await fetch(url);
      const result = await res.json();
      
      if (result.success) {
        document.getElementById('notifMessage').value = '';
        const label = recipient === 'all' ? '所有學生' : recipient;
        statusEl.textContent = '✅ 已發送給 ' + label;
        statusEl.className = 'send-status success';
        await loadNotifications();
      } else {
        statusEl.textContent = '❌ 發送失敗';
        statusEl.className = 'send-status error';
      }
    } catch(e) {
      statusEl.textContent = '❌ 網路錯誤';
      statusEl.className = 'send-status error';
    }

    clearTimeout(sendStatusTimer);
    sendStatusTimer = setTimeout(() => {
      statusEl.textContent = '';
      statusEl.className = 'send-status';
    }, 5000);
  }

  // ============================================================
  //  核心系統
  // ============================================================
  const STORAGE_KEY = "classworks_pro_nopopup";
  const columns = [
    { id: "inbox", title: "待處理", icon: "fa-inbox" },
    { id: "grading", title: "正在批改", icon: "fa-pen" },
    { id: "review", title: "待覆核", icon: "fa-magnifying-glass" },
    { id: "done", title: "已完成", icon: "fa-circle-check" },
    { id: "archive", title: "封存", icon: "fa-box-archive" }
  ];
  const typeMap = {
    docx: ["fa-file-word","#2b579a","Word"], xlsx: ["fa-file-excel","#217346","Excel"],
    pptx: ["fa-file-powerpoint","#b7472a","PowerPoint"], pdf: ["fa-file-pdf","#d32f2f","PDF"],
    txt: ["fa-file-lines","#64748b","Text"], html: ["fa-file-code","#e34c26","HTML"],
    hw: ["fa-clipboard-check","#0f766e","HW Tracker"]
  };
  const hwSubjects = ["中文","英文","數學","科學","中史","歷史","公經社","其他"];
  const hwStatuses = { submitted:"✓", late:"✗", absent:"A", empty:"◻" };

  function getExt(n) { const p=String(n||"").split("."); return p.length>1?p.pop().toLowerCase():"txt"; }
  function getTypeMeta(e) { return typeMap[e]||["fa-file","#64748b","File"]; }
  function esc(s) { return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[m]); }
  function stripHtml(h) { const d=document.createElement("div"); d.innerHTML=h||""; return d.textContent||""; }
  function toast(m,d) { d=d||1500; const t=document.getElementById("toast"); t.textContent=m; t.classList.add("show"); clearTimeout(toast._t); toast._t=setTimeout(()=>t.classList.remove("show"),d); }

  function createDefaultHwData() {
    const c={}; ["F1A","F1B","F2A","F2B","F3A","F3B","F4A","F4B","F5A","F5B","F6A","F6B"].forEach(cl=>{c[cl]=[];for(let i=1;i<=33;i++)c[cl].push("學生"+String(i).padStart(2,"0"));});
    return { currentDate:new Date().toISOString().slice(0,10), currentClass:"F1A", selectedSubjects:[...hwSubjects], classes:c, records:{} };
  }

  function makeFile(f) {
    const ext=getExt(f.name), m=getTypeMeta(ext);
    return { id:f.id||Date.now(), name:f.name||"新文件.txt", type:"file", ext, icon:m[0], color:m[1], typeLabel:m[2],
      status:f.status||"inbox", subject:f.subject||"班務", className:f.className||"未分類",
      due:f.due||new Date().toISOString().slice(0,10), priority:f.priority||"中",
      content:f.content||"", readonly:!!f.readonly, hidden:!!f.hidden, rich:!!f.rich,
      hwData:f.hwData||(ext==="hw"?createDefaultHwData():null), created:f.created||Date.now(), modified:f.modified||Date.now() };
  }

  // 預設種子資料
  const seed = [
    makeFile({id:1,name:"3A班_中文作文.docx",status:"inbox",subject:"中文",className:"3A",due:"2026-07-28",priority:"高",content:"<p><b>三年級中文作文</b></p><p>題目：我的暑假生活</p>",rich:true}),
    makeFile({id:2,name:"3B班_數學工作紙.xlsx",status:"grading",subject:"數學",className:"3B",due:"2026-07-22",priority:"中",readonly:true,content:"數學工作紙 - 單元五\n1. 25×4=____\n2. 100÷5=____"}),
    makeFile({id:3,name:"6A班_畢業演講稿.pptx",status:"review",subject:"活動",className:"6A",due:"2026-07-30",priority:"高",content:"畢業典禮演講稿\n\n尊敬的老師、親愛的同學們：大家好！"}),
    makeFile({id:4,name:"4C班_英文默書.pdf",status:"done",subject:"英文",className:"4C",due:"2026-07-15",priority:"低",content:"English Dictation\nUnit 6\n1. classroom\n2. teacher"}),
    makeFile({id:5,name:"F1A_功課追蹤.hw",status:"inbox",subject:"功課追蹤",className:"F1A",due:"2026-07-20",priority:"高",hwData:createDefaultHwData()})
  ];

  let data = [];
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) { const parsed = JSON.parse(saved); if (Array.isArray(parsed)) data = parsed.map(makeFile); }
  } catch(e) {}
  if (data.length === 0) data = seed.slice();
  // ============================================================
  //  資料儲存
  // ============================================================

  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); } catch(e) {}
  }

  // ============================================================
  //  渲染函數
  // ============================================================

  let renderTimer = null;

  function safeRender() {
    clearTimeout(renderTimer);
    renderTimer = setTimeout(renderAll, 50);
  }

  function renderAll() {
    renderFiles();
    updateNotificationBadge();
  }

  // ============================================================
  //  狀態變數
  // ============================================================

  let activeView = "kanban";
  let currentSort = "due";
  let subjectFilter = "all";
  let typeFilter = "all";
  let searchQuery = "";
  let darkMode = false;
  let selectedId = null;
  let currentViewerFile = null;
  let isEditMode = false;
  let editingItem = null;
  let currentYear = new Date().getFullYear();
  let currentMonth = new Date().getMonth() + 1;
  let confirmCallback = null;
  let viewerHasChanges = false;
  function dueInfo(due) {
    const t=new Date(), td=new Date(t.getFullYear(),t.getMonth(),t.getDate()), dd=new Date(due+"T00:00:00");
    const diff=Math.ceil((dd-td)/86400000);
    if(diff<0)return{text:"逾期"+Math.abs(diff)+"日",overdue:true,urgent:true,tag:"red"};
    if(diff===0)return{text:"今日截止",overdue:false,urgent:true,tag:"orange"};
    if(diff<=3)return{text:diff+"日後",overdue:false,urgent:true,tag:"orange"};
    return{text:diff+"日後",overdue:false,urgent:false,tag:"gray"};
  }

  function getFilteredDocs() {
    let docs=data.filter(f=>f.type==="file"&&!f.hidden);
    if(searchQuery.trim()){const q=searchQuery.trim().toLowerCase();docs=docs.filter(f=>[f.name,f.ext,f.subject,f.className,f.content].join(" ").toLowerCase().includes(q));}
    if(subjectFilter!=="all")docs=docs.filter(f=>f.subject===subjectFilter);
    if(typeFilter!=="all")docs=docs.filter(f=>f.ext===typeFilter);

  // ===== AI 智能建檔 =====
  function processAI() {
    const input=document.getElementById("aiInput"), text=input.value.trim();
    if(!text){toast("請輸入描述"); return;}
    let className="3A";const cm=text.match(/([1-6][A-D]|[一二三四五六][A-D]|F[1-6][A-D])班?/i);
    if(cm){const map={"一":"1","二":"2","三":"3","四":"4","五":"5","六":"6"};let r=cm[1].toUpperCase();if(map[r[0]])r=map[r[0]]+r[1];className=r;}
    let subject="班務",title="班務文件",ext="txt";
    if(/\.hw|功課追蹤/.test(text)){subject="功課追蹤";title="功課追蹤";ext="hw";}
    else if(/中文|作文/.test(text)){subject="中文";title="中文作文";ext="docx";}
    else if(/數學|工作紙/.test(text)){subject="數學";title="數學工作紙";ext="xlsx";}
    else if(/英文|默書/i.test(text)){subject="英文";title="英文默書";ext="pdf";}
    const d=new Date();const abs=text.match(/(?:(\d+)月)?(\d+)(?:號|日)/);
    if(abs){if(abs[1])d.setMonth(parseInt(abs[1])-1);d.setDate(parseInt(abs[2]));}
    else if(/後日/.test(text))d.setDate(d.getDate()+2);
    else if(/聽日|明日|明天/.test(text))d.setDate(d.getDate()+1);
    else if(/下星期|下周/.test(text)){const wm=text.match(/(?:下星期|下周)([一二三四五六日天])/);if(wm){const wmap={日:0,天:0,一:1,二:2,三:3,四:4,五:5,六:6};d.setDate(d.getDate()+wmap[wm[1]]-d.getDay()+7);}else d.setDate(d.getDate()+7);}
    const due=d.toISOString().slice(0,10),priority=/急|urgent/.test(text)?"高":"中",name=className+"_"+title+"."+ext;
    const newFile = makeFile({id:Date.now(), name, status:"inbox", subject, className, due, priority, content:"", hwData:ext==="hw"?createDefaultHwData():null});
    data.unshift(newFile);
    input.value="";document.getElementById("aiPanel").classList.remove("active");safeRender();toast("✨ 已建立："+name);
  }

  // ===== .hw 系統 =====
  function hwEnsure(doc){if(!doc.hwData)doc.hwData=createDefaultHwData();const hw=doc.hwData;if(!hw.currentDate)hw.currentDate=new Date().toISOString().slice(0,10);if(!hw.currentClass)hw.currentClass="F1A";if(!hw.selectedSubjects)hw.selectedSubjects=[...hwSubjects];if(!hw.classes)hw.classes=createDefaultHwData().classes;if(!hw.records)hw.records={};const students=hw.classes[hw.currentClass]||[];if(!hw.records[hw.currentDate])hw.records[hw.currentDate]={};if(!hw.records[hw.currentDate][hw.currentClass])hw.records[hw.currentDate][hw.currentClass]={};students.forEach((_,idx)=>{if(!hw.records[hw.currentDate][hw.currentClass][idx])hw.records[hw.currentDate][hw.currentClass][idx]={};hwSubjects.forEach(sub=>{if(!hw.records[hw.currentDate][hw.currentClass][idx][sub])hw.records[hw.currentDate][hw.currentClass][idx][sub]="empty";});});}
  function hwGet(doc,idx,sub){hwEnsure(doc);return doc.hwData.records[doc.hwData.currentDate][doc.hwData.currentClass][idx][sub]||"empty";}
  function hwSet(doc,idx,sub,status){hwEnsure(doc);doc.hwData.records[doc.hwData.currentDate][doc.hwData.currentClass][idx][sub]=status;doc.modified=Date.now();save();}
  function renderHwApp(doc,container){hwEnsure(doc);const hw=doc.hwData;container.innerHTML='<div class="hw-top"><div><h2 style="font-size:0.85rem;">🤖 .hw 功課追蹤</h2></div><div class="hw-row"><input class="input" type="date" id="hwDate" value="'+esc(hw.currentDate)+'" style="width:130px;height:28px;font-size:0.65rem;padding:2px 8px;"><button class="btn" id="hwAddClass" style="padding:2px 10px;font-size:0.65rem;">+ 班級</button><button class="btn primary" id="hwSave" style="padding:2px 10px;font-size:0.65rem;">儲存</button></div></div><div class="hw-panel"><div class="hw-chips" id="hwClasses"></div></div><div class="hw-panel"><div style="font-size:0.6rem;font-weight:850;margin-bottom:2px;">📚 科目</div><div class="hw-subjects" id="hwSubjects"></div></div><div class="hw-panel"><div class="hw-row"><button class="btn" data-hw-batch="submitted" style="padding:2px 8px;font-size:0.6rem;">✓ 全班已交</button><button class="btn" data-hw-batch="late" style="padding:2px 8px;font-size:0.6rem;">✗ 全班欠交</button><button class="btn" data-hw-batch="absent" style="padding:2px 8px;font-size:0.6rem;">A 全班缺席</button><button class="btn" data-hw-batch="empty" style="padding:2px 8px;font-size:0.6rem;">◻ 清空</button></div><div class="hw-ai-box"><input class="input" id="hwCommand" placeholder="例：除 #5 外全班已交" style="height:26px;font-size:0.6rem;padding:2px 8px;"><button class="btn ai" id="hwRunCommand" style="padding:2px 10px;font-size:0.6rem;">執行</button></div></div><div class="hw-panel hw-report" id="hwReport"></div><div class="hw-table-wrap"><table class="hw-table" id="hwTable"></table></div>';
    document.getElementById("hwDate").onchange=e=>{hw.currentDate=e.target.value;hwEnsure(doc);renderHwApp(doc,container);};
    document.getElementById("hwSave").onclick=()=>{saveViewer();};
    document.getElementById("hwAddClass").onclick=()=>{hwAddClass(doc);};
    document.querySelectorAll("[data-hw-batch]").forEach(btn=>{btn.onclick=()=>{hwBatch(doc,btn.dataset.hwBatch);renderHwApp(doc,container);};});
    document.getElementById("hwRunCommand").onclick=()=>{const cmd=document.getElementById("hwCommand").value.trim();if(cmd&&!hwParseCommand(doc,cmd))toast("無法識別指令");renderHwApp(doc,container);};
    renderHwClasses(doc);renderHwSubjects(doc);renderHwReport(doc);renderHwTable(doc,container);
  }
  function renderHwClasses(doc){const box=document.getElementById("hwClasses");box.innerHTML="";Object.keys(doc.hwData.classes).sort().forEach(cls=>{const c=document.createElement("div");c.className="hw-chip"+(cls===doc.hwData.currentClass?" active":"");c.textContent=cls;c.onclick=()=>{doc.hwData.currentClass=cls;hwEnsure(doc);renderHwApp(doc,document.getElementById("viewerContent"));};box.appendChild(c);});}
  function renderHwSubjects(doc){const box=document.getElementById("hwSubjects");box.innerHTML="";hwSubjects.forEach(sub=>{const item=document.createElement("div");item.className="hw-subject"+(doc.hwData.selectedSubjects.includes(sub)?" active":"");item.textContent=sub;item.onclick=()=>{if(doc.hwData.selectedSubjects.includes(sub))doc.hwData.selectedSubjects=doc.hwData.selectedSubjects.filter(s=>s!==sub);else doc.hwData.selectedSubjects.push(sub);renderHwApp(doc,document.getElementById("viewerContent"));};box.appendChild(item);});}
  function renderHwReport(doc){const hw=doc.hwData,students=hw.classes[hw.currentClass]||[],subs=hw.selectedSubjects.length?hw.selectedSubjects:hwSubjects;let submitted=0,late=0,absent=0;students.forEach((_,idx)=>{subs.forEach(sub=>{const st=hwGet(doc,idx,sub);if(st==="submitted")submitted++;else if(st==="late")late++;else if(st==="absent")absent++;});});const total=students.length*subs.length,rate=total?(submitted/total*100).toFixed(1):"0";document.getElementById("hwReport").innerHTML='<b>📊 統計</b> 完成率：<b>'+rate+'%</b> ✓'+submitted+' ✗'+late+' A'+absent;}
  function renderHwTable(doc,container){hwEnsure(doc);const hw=doc.hwData,table=document.getElementById("hwTable"),students=hw.classes[hw.currentClass]||[];let html="<thead><tr><th class='hw-name'>姓名</th>";hwSubjects.forEach(sub=>{html+="<th>"+esc(sub)+"</th>";});html+="</tr></thead><tbody>";students.forEach((name,idx)=>{html+="<tr><td class='hw-name'>"+esc(name)+"</td>";hwSubjects.forEach(sub=>{const st=hwGet(doc,idx,sub);html+="<td><div class='hw-cell' data-hw-idx='"+idx+"' data-hw-sub='"+esc(sub)+"' data-status='"+st+"'>"+hwStatuses[st]+"</div></td>";});html+="</tr>";});html+="</tbody>";table.innerHTML=html;
    table.querySelectorAll(".hw-cell").forEach(cell=>{cell.onclick=()=>{const idx=parseInt(cell.dataset.hwIdx),sub=cell.dataset.hwSub,cur=hwGet(doc,idx,sub),order=["empty","submitted","late","absent"],next=order[(order.indexOf(cur)+1)%order.length];hwSet(doc,idx,sub,next);renderHwApp(doc,container);};});}
  function hwBatch(doc,status){const hw=doc.hwData,students=hw.classes[hw.currentClass]||[],subs=hw.selectedSubjects.length?hw.selectedSubjects:hwSubjects;students.forEach((_,idx)=>{subs.forEach(sub=>hwSet(doc,idx,sub,status));});toast("全班已設為："+status);}
  function hwAddClass(doc){hwEnsure(doc);const className=prompt("請輸入新班級名稱（例如：F3A）：","F3A");if(!className||!className.trim())return;const newClass=className.trim().toUpperCase();if(doc.hwData.classes[newClass]){toast("班級 "+newClass+" 已存在");return;}doc.hwData.classes[newClass]=[];for(let i=1;i<=33;i++)doc.hwData.classes[newClass].push("學生"+String(i).padStart(2,"0"));doc.hwData.currentClass=newClass;doc.modified=Date.now();const container=document.getElementById("viewerContent");if(container&&currentViewerFile&&currentViewerFile.id===doc.id){renderHwApp(doc,container);}save();toast("✅ 已新增班級: "+newClass);}
  function hwParseCommand(doc,cmd){const hw=doc.hwData,students=hw.classes[hw.currentClass]||[],subs=hw.selectedSubjects.length?hw.selectedSubjects:hwSubjects;const ex=cmd.match(/除\s*#?([\d,\s#]+)\s*外\s*全班\s*已交/i);if(ex){const ids=ex[1].split(/[,#\s]+/).filter(Boolean).map(Number);students.forEach((_,idx)=>{if(!ids.includes(idx+1))subs.forEach(sub=>hwSet(doc,idx,sub,"submitted"));});return true;}if(/全班\s*已交/.test(cmd)){hwBatch(doc,"submitted");return true;}if(/全班\s*欠交/.test(cmd)){hwBatch(doc,"late");return true;}if(/全班\s*缺席/.test(cmd)){hwBatch(doc,"absent");return true;}if(/全班\s*清空/.test(cmd)){hwBatch(doc,"empty");return true;}return false;}

  // ===== 編輯器工具列 =====
  function bindEditorToolbar() {
    document.querySelectorAll("#editorToolbar [data-cmd]").forEach(btn => {
      btn.addEventListener("mousedown", e => {
        e.preventDefault();
        const cmd = btn.dataset.cmd;
        const content = document.getElementById("viewerContent");
        if (!content.contentEditable || content.contentEditable !== "true") { toast("請先進入編輯模式"); return; }
        if(cmd === "hiliteColor"){const color=document.getElementById("highlightPicker").value;document.execCommand("hiliteColor",false,color);}
        else if(cmd === "foreColor"){const color=document.getElementById("textColorPicker").value;document.execCommand("foreColor",false,color);}
        else if(cmd === "createTable"){const rows=prompt("列數：",3);const cols=prompt("行數：",3);if(rows&&cols){let table='<table style="width:100%;border-collapse:collapse;border:1px solid #ccc;">';for(let r=0;r<parseInt(rows);r++){table+='<tr>';for(let c=0;c<parseInt(cols);c++){table+='<td contenteditable="true" style="border:1px solid #ccc;padding:6px;min-width:40px;">&nbsp;</td>';}table+='</tr>';}table+='</table>';document.execCommand("insertHTML",false,table);}}
        else if(cmd === "undo"){document.execCommand("undo",false,null);}
        else if(cmd === "redo"){document.execCommand("redo",false,null);}
        else{document.execCommand(cmd,false,null);}
        content.focus();
        viewerHasChanges = true;
      });
    });
    document.getElementById("fontSizeSelect").addEventListener("change",function(){const content=document.getElementById("viewerContent");if(!content.contentEditable||content.contentEditable!=="true"){toast("請先進入編輯模式");return;}document.execCommand("fontSize",false,this.value);content.focus();viewerHasChanges=true;});
    document.getElementById("fontFamilySelect").addEventListener("change",function(){const content=document.getElementById("viewerContent");if(!content.contentEditable||content.contentEditable!=="true"){toast("請先進入編輯模式");return;}document.execCommand("fontName",false,this.value);content.focus();viewerHasChanges=true;});
    // 三點選單
    document.getElementById("moreMenuToggle").addEventListener("click", function(e) {
      e.stopPropagation();
      document.getElementById("moreMenuDropdown").classList.toggle("show");
    });
    document.addEventListener("click", function(e) {
      const wrapper = document.querySelector('.more-menu-wrapper');
      if (wrapper && !wrapper.contains(e.target)) {
        document.getElementById("moreMenuDropdown").classList.remove("show");
      }
    });
    document.getElementById("moreMenuToggle").addEventListener("touchstart", function(e) {
      e.preventDefault();
      document.getElementById("moreMenuDropdown").classList.toggle("show");
    }, { passive: false });
  }

  // ===== 事件綁定 =====
  function bindEvents() {
    document.querySelectorAll(".nav-item[data-view]").forEach(item=>{item.addEventListener("click",()=>{document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));item.classList.add("active");activeView=item.dataset.view;safeRender();});});
    document.getElementById("themeToggle").addEventListener("click",()=>{darkMode=!darkMode;document.documentElement.setAttribute("data-theme",darkMode?"dark":"light");});
    document.getElementById("searchInput").addEventListener("input",e=>{searchQuery=e.target.value;safeRender();});
    document.getElementById("subjectFilter").addEventListener("change",e=>{subjectFilter=e.target.value;safeRender();});
    document.getElementById("typeFilter").addEventListener("change",e=>{typeFilter=e.target.value;safeRender();});
    document.getElementById("sortSelect").addEventListener("change",e=>{currentSort=e.target.value;safeRender();});
    document.getElementById("btnNewFile").addEventListener("click",createNewFile);
    document.getElementById("btnNewHw").addEventListener("click",createHwFile);
    document.getElementById("btnAIToggle").addEventListener("click",()=>{const p=document.getElementById("aiPanel");p.classList.toggle("active");if(p.classList.contains("active"))document.getElementById("aiInput").focus();});
    document.getElementById("btnAiSubmit").addEventListener("click",processAI);
    document.getElementById("aiInput").addEventListener("keydown",e=>{if(e.key==="Enter")processAI();});
    document.getElementById("btnPrevMonth").addEventListener("click",()=>{currentMonth--;if(currentMonth<1){currentMonth=12;currentYear--;}safeRender();});
    document.getElementById("btnNextMonth").addEventListener("click",()=>{currentMonth++;if(currentMonth>12){currentMonth=1;currentYear++;}safeRender();});
    document.getElementById("btnToday").addEventListener("click",()=>{const t=new Date();currentYear=t.getFullYear();currentMonth=t.getMonth()+1;safeRender();});
    document.addEventListener("click",e=>{if(!e.target.closest("#ctxMenu"))hideContextMenu();});
    document.getElementById("ctxOpen").addEventListener("click",()=>{const item=getCtxItem();if(item)openViewer(item);hideContextMenu();});
    document.getElementById("ctxProps").addEventListener("click",()=>{const item=getCtxItem();if(item)openProperties(item);hideContextMenu();});
    document.getElementById("ctxRename").addEventListener("click",()=>{const item=getCtxItem();if(item)renameDoc(item);hideContextMenu();});
    document.getElementById("ctxDelete").addEventListener("click",()=>{const item=getCtxItem();if(item)deleteDoc(item);hideContextMenu();});
    document.getElementById("viewerEdit").addEventListener("click",toggleEditMode);
    document.getElementById("viewerSaveTop").addEventListener("click",saveViewer);
    document.getElementById("viewerDownload").addEventListener("click",downloadFile);
    document.getElementById("viewerClose").addEventListener("click",confirmCloseViewer);
    document.getElementById("viewerCancel").addEventListener("click",confirmCloseViewer);
    document.getElementById("viewerSaveClose").addEventListener("click",()=>{saveViewer();closeViewer();});
    document.getElementById("viewerModal").addEventListener("click",e=>{if(e.target.id==="viewerModal")confirmCloseViewer();});
    document.getElementById("propClose").addEventListener("click",closeProperties);
    document.getElementById("propCancel").addEventListener("click",closeProperties);
    document.getElementById("propSave").addEventListener("click",saveProperties);
    document.getElementById("propModal").addEventListener("click",e=>{if(e.target.id==="propModal")closeProperties();});
    document.getElementById("newFileClose").addEventListener("click",()=>document.getElementById("newFileModal").classList.remove("active"));
    document.getElementById("newFileCancel").addEventListener("click",()=>document.getElementById("newFileModal").classList.remove("active"));
    document.getElementById("newFileConfirm").addEventListener("click",confirmNewFile);
    document.getElementById("newFileModal").addEventListener("click",e=>{if(e.target.id==="newFileModal")document.getElementById("newFileModal").classList.remove("active");});
    document.getElementById("confirmYes").addEventListener("click",()=>{document.getElementById("confirmModal").classList.remove("active");if(confirmCallback)confirmCallback('save');confirmCallback=null;restoreConfirmButtons();});
    document.getElementById("confirmNo").addEventListener("click",()=>{document.getElementById("confirmModal").classList.remove("active");if(confirmCallback)confirmCallback('nosave');confirmCallback=null;restoreConfirmButtons();});
    document.getElementById("confirmModal").addEventListener("click",e=>{if(e.target.id==="confirmModal"){document.getElementById("confirmModal").classList.remove("active");confirmCallback=null;restoreConfirmButtons();}});
    document.getElementById("notificationBtn").addEventListener("click", function() {
      renderNotificationList();
      document.getElementById("notificationModal").classList.add("active");
    });
    document.getElementById("notificationClose").addEventListener("click", function() {
      document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationModalClose").addEventListener("click", function() {
      document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationModal").addEventListener("click", function(e) {
      if (e.target === this) document.getElementById("notificationModal").classList.remove("active");
    });
    document.getElementById("notificationMarkAll").addEventListener("click", markAllRead);
    document.getElementById("notifSendBtn").addEventListener("click", sendNotification);
    document.getElementById("notifMessage").addEventListener("keydown", function(e) {
      if (e.key === "Enter") { e.preventDefault(); sendNotification(); }
    });
    document.addEventListener("keydown",e=>{if(e.key==="Escape"){hideContextMenu();closeProperties();confirmCloseViewer();document.getElementById("newFileModal").classList.remove("active");document.getElementById("confirmModal").classList.remove("active");document.getElementById("notificationModal").classList.remove("active");document.getElementById("moreMenuDropdown").classList.remove("show");}});
    bindEditorToolbar();
  }

  // ===== 初始化 =====
  bindEvents();
  renderAll();
  loadNotifications();
  setInterval(loadNotifications, 30000);
  toast("珊瑚小助 · 老師版 已啟動");
})();
</script>
</body>
</html>
